
    <!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ROUS - Catálogo</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
        <style>
            :root { 
                --primary-color: #FF4B2B; 
                --primary-hover: #E63E1F;
                --dark-color: #1a1a1a; 
                --bg-light: #fdfdfd;
                --disabled-gray: #6c757d;
                --border-soft: #f0f0f0;
            }
            
            body { 
                background-color: var(--bg-light); 
                font-family: 'Inter', sans-serif; 
                color: #333;
            }

            .navbar { 
                background-color: white; 
                box-shadow: 0 2px 15px rgba(0,0,0,0.08);
                border-bottom: 3px solid var(--primary-color);
            }

            .brand-name {
                font-family: 'Montserrat', sans-serif;
                font-weight: 800;
                font-size: 1.8rem;
                letter-spacing: -1px;
                color: var(--primary-color);
            }

            /* --- BUSCADOR --- */
            .search-container {
                max-width: 600px;
                margin: 0 auto 1.5rem auto;
                position: relative;
                padding: 0 10px;
            }
            .search-icon-wrapper {
                position: absolute;
                top: 50%;
                left: 25px;
                transform: translateY(-50%);
                color: #888;
                font-size: 1.2rem;
                pointer-events: none;
                z-index: 5;
            }
            .search-input {
                border: 2px solid var(--border-soft);
                border-radius: 30px;
                padding: 12px 25px 12px 50px;
                font-size: 1.05rem;
                transition: all 0.3s;
                position: relative;
                z-index: 1;
            }
            .search-input:focus {
                border-color: var(--primary-color);
                box-shadow: 0 0 0 0.25rem rgba(255, 75, 43, 0.1);
                outline: none;
            }

            /* --- BARRA DE CATEGORÍAS SIN LA LÍNEA GRIS DE ABAJO --- */
            .category-tabs {
                display: flex;
                gap: 10px;
                overflow-x: auto;
                padding: 5px 10px 10px 10px;
                margin-bottom: 1.5rem;
                cursor: grab;
                user-select: none;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none; /* Oculta scrollbar en Firefox */
                -ms-overflow-style: none;  /* Oculta scrollbar en Internet Explorer/Edge */
            }
            .category-tabs:active {
                cursor: grabbing;
            }
            /* Oculta por completo la barra gris en Chrome, Safari y Opera */
            .category-tabs::-webkit-scrollbar {
                display: none;
                width: 0 !important;
                height: 0 !important;
            }
            .category-btn {
                background: white;
                border: 2px solid var(--border-soft);
                padding: 8px 18px;
                border-radius: 20px;
                font-weight: 600;
                white-space: nowrap;
                color: #555;
                transition: all 0.2s;
                font-size: 0.95rem;
            }
            .category-btn.active {
                background: var(--primary-color);
                border-color: var(--primary-color);
                color: white;
            }

            /* --- TARJETA CORREGIDA PARA MÓVILES (MENOS LARGA) --- */
            .card { 
                border: 2px solid var(--border-soft); 
                border-radius: 18px; 
                box-shadow: 0 4px 10px rgba(0,0,0,0.02); 
                transition: all 0.3s ease;
                background: #fff;
                overflow: hidden;
            }

            .card.selected { 
                border-color: var(--primary-color); 
                background: #fffefd; 
                transform: translateY(-5px); 
                box-shadow: 0 10px 20px rgba(255, 75, 43, 0.12);
            }

            /* Altura adaptativa: Corta en celulares para no verse estirado, normal en PC */
            .img-container { 
                height: 140px; 
                display: flex; 
                align-items: center; 
                justify-content: center; 
                background: #fff;
                padding: 10px; 
            }
            @media (min-width: 768px) {
                .img-container {
                    height: 190px;
                }
            }

            .card-img-top { 
                max-height: 100%; 
                max-width: 100%; 
                object-fit: contain; 
            }

            .no-image-icon { 
                font-size: 3rem; 
                color: #ced4da; 
            }

            /* --- NOMBRES DE PRODUCTOS AJUSTADOS (ENTRAN MÁS LETRAS) --- */
            .card-title {
                font-size: 0.9rem;
                font-weight: 700;
                color: var(--dark-color);
                margin-bottom: 0.3rem;
                display: -webkit-box;
                -webkit-line-clamp: 2; /* Permite hasta 2 líneas de texto antes de ocultar */
                -webkit-box-orient: vertical;  
                overflow: hidden;
                white-space: normal; /* Permite el salto de línea normal */
                height: 2.7rem; /* Mantiene la misma altura uniforme para que las tarjetas queden alineadas */
                line-height: 1.35;
            }
            @media (min-width: 768px) {
                .card-title {
                    font-size: 1rem;
                    height: 3rem;
                    line-height: 1.5;
                }
            }

            .price-tag { 
                font-size: 1.1rem; 
                font-weight: 800; 
                color: var(--primary-color);
            }

            .qty-controls {
                display: none;
                align-items: center;
                justify-content: space-between;
                background: var(--primary-color);
                border-radius: 12px;
                padding: 5px;
                color: white;
                height: 42px;
            }

            .qty-btn {
                background: transparent;
                border: none;
                color: white;
                font-size: 1.3rem;
                padding: 0 12px;
                font-weight: 800;
                line-height: 1;
            }

            .qty-val { font-weight: 700; font-size: 1rem; }

            .btn-check-item { 
                width: 100%; 
                border-radius: 12px; 
                font-weight: 700; 
                border: 2px solid var(--primary-color); 
                color: var(--primary-color); 
                background: transparent;
                padding: 8px;
                transition: 0.2s;
                height: 42px;
                font-size: 0.95rem;
            }

            /* --- BOTÓN 'NO DISPONIBLE' CORREGIDO PARA QUE NO SE SALGA EL TEXTO --- */
            .btn-check-item:disabled {
                border-color: #adb5bd !important;
                color: var(--disabled-gray) !important;
                background-color: #f8f9fa;
                opacity: 1; 
                font-size: 0.85rem; /* Letra un poco más pequeña para evitar desbordes */
                padding: 6px 4px;
                line-height: 1.2;
                white-space: normal; /* Permite acomodarse internamente sin romper el layout */
            }

            .badge-stock { 
                position: absolute; 
                top: 8px; 
                right: 8px; 
                font-size: 0.65rem; 
                padding: 4px 8px;
                border-radius: 6px;
                font-weight: 700;
                z-index: 10;
            }

            #cart-floating { 
                position: fixed; 
                bottom: 25px; 
                right: 25px; 
                z-index: 1000; 
                background: #25D366; 
                color: white; 
                border: none; 
                border-radius: 50px; 
                padding: 15px 25px; 
                font-weight: 800; 
                display: none; 
                align-items: center; 
                gap: 10px; 
                box-shadow: 0 8px 24px rgba(37, 211, 102, 0.35); 
                font-size: 0.95rem;
            }

            .footer-info {
                background: #fff;
                margin-top: 50px;
                padding: 30px 0;
                border-top: 1px solid #eee;
                color: #888;
            }
            
            /* Ajuste de márgenes para la grilla de Bootstrap en celulares */
            @media (max-width: 576px) {
                .container-grid {
                    padding-left: 8px;
                    padding-right: 8px;
                }
                .row-grid {
                    --bs-gutter-x: 0.5rem; /* Menos espacio horizontal entre tarjetas para que se vean más grandes */
                    --bs-gutter-y: 0.5rem;
                }
            }
        </style>
    </head>
    <body>
        <nav class="navbar sticky-top py-2 mb-3">
            <div class="container d-flex justify-content-center">
                <span class="brand-name">ROUS</span>
            </div>
        </nav>

        <div class="container container-grid pb-5">
            <!-- Barra de Búsqueda -->
            <div class="search-container">
                <div class="search-icon-wrapper">
                    <i class="bi bi-search"></i>
                </div>
                <input type="text" id="search-bar" class="form-control search-input" placeholder="Buscar producto por nombre..." oninput="filtrarProductos()">
            </div>

            <!-- Pestañas de Categorías -->
            <div class="category-tabs" id="category-bar">
                <button class="category-btn active" onclick="seleccionarCategoria('TODOS', this)">Todos</button>
    
            </div>

            <!-- Contenedor de Tarjetas -->
            <div class="row row-grid g-3" id="products-grid">
    
            </div>
        </div>

        <div class="footer-info text-center">
            <div class="container">
                <p class="mb-1 fw-bold" style="color: var(--primary-color)">ROUS</p>
                <p class="small mb-0">Sincronizado: 18/06/2026 08:30 AM</p>
            </div>
        </div>

        <button id="cart-floating" onclick="sendOrder()">
            <i class="bi bi-whatsapp fs-4"></i>
            <span>Enviar Pedido (<span id="cart-count">0</span>)</span>
        </button>

        <script>
            let cart = {};
            let categoriaSeleccionada = 'TODOS';

            // --- ARRASTRE CON RATÓN PARA CATEGORÍAS (PC) ---
            const slider = document.getElementById('category-bar');
            let isDown = false;
            let startX;
            let scrollLeft;

            slider.addEventListener('mousedown', (e) => {
                isDown = true;
                startX = e.pageX - slider.offsetLeft;
                scrollLeft = slider.scrollLeft;
            });
            slider.addEventListener('mouseleave', () => {
                isDown = false;
            });
            slider.addEventListener('mouseup', () => {
                isDown = false;
            });
            slider.addEventListener('mousemove', (e) => {
                if(!isDown) return;
                e.preventDefault();
                const x = e.pageX - slider.offsetLeft;
                const walk = (x - startX) * 2;
                slider.scrollLeft = scrollLeft - walk;
            });

            // --- LÓGICA DE FILTRADO ---
            function seleccionarCategoria(categoria, elemento) {
                document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
                elemento.classList.add('active');
                
                categoriaSeleccionada = categoria;
                filtrarProductos();
            }

            function filtrarProductos() {
                const query = document.getElementById('search-bar').value.toLowerCase().trim();
                const productos = document.querySelectorAll('.product-item');

                productos.forEach(prod => {
                    const nombreProd = prod.getAttribute('data-name');
                    const catProd = prod.getAttribute('data-category');

                    const coincideBusqueda = nombreProd.includes(query);
                    const coincideCategoria = (categoriaSeleccionada === 'TODOS' || catProd === categoriaSeleccionada);

                    if (coincideBusqueda && coincideCategoria) {
                        prod.style.display = 'block';
                    } else {
                        prod.style.display = 'none';
                    }
                });
            }

            // --- CARRITO ---
            function addItem(id, name, price, max) {
                cart[id] = { name, price, qty: 1, max };
                renderItemState(id);
                updateCartCount();
            }

            function updateQty(id, delta, max) {
                if (!cart[id]) return;
                
                let newQty = cart[id].qty + delta;
                
                if (newQty <= 0) {
                    delete cart[id];
                    renderItemState(id, true);
                } else if (newQty <= cart[id].max) {
                    cart[id].qty = newQty;
                    document.getElementById('qty-val-' + id).innerText = newQty;
                }
                
                updateCartCount();
            }

            function renderItemState(id, reset = false) {
                const btnMain = document.getElementById('btn-main-' + id);
                const qtyCtrl = document.getElementById('qty-ctrl-' + id);
                const card = document.getElementById('card-' + id);

                if (reset) {
                    btnMain.style.display = 'block';
                    qtyCtrl.style.display = 'none';
                    card.classList.remove('selected');
                } else {
                    btnMain.style.display = 'none';
                    qtyCtrl.style.display = 'flex';
                    card.classList.add('selected');
                    document.getElementById('qty-val-' + id).innerText = cart[id].qty;
                }
            }

            function updateCartCount() {
                const count = Object.values(cart).reduce((sum, item) => sum + item.qty, 0);
                document.getElementById('cart-count').innerText = count;
                document.getElementById('cart-floating').style.display = count > 0 ? 'flex' : 'none';
            }

            function sendOrder() {
                let message = "*PEDIDO PARA ROUS*\n";
                message += "----------------------------\n";
                let total = 0;
                
                for (let id in cart) {
                    let item = cart[id];
                    let subtotal = item.price * item.qty;
                    message += "• " + item.qty + "x " + item.name + " (S/ " + subtotal.toFixed(2) + ")\n";
                    total += subtotal;
                }
                
                message += "----------------------------\n";
                message += "*TOTAL: S/ " + total.toFixed(2) + "*";
                
                window.open("https://wa.me/51935900740?text=" + encodeURIComponent(message), '_blank');
            }
        </script>
    </body>
    </html>
